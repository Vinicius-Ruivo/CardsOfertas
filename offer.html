<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oferta Educacional</title>
  <meta name="description" content="Visualização da sua oferta educacional">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-1: #45196a;
      --bg-2: #5c2a88;
      --bg-3: #31164f;
      --accent: #3dc9c4;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.82);
      --panel: rgba(255, 255, 255, 0.12);
      --panel-border: rgba(255, 255, 255, 0.18);
    }
    body {
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1000px 420px at 10% -10%, rgba(160, 86, 236, 0.25), transparent 65%),
        radial-gradient(900px 420px at 85% 0%, rgba(39, 206, 197, 0.22), transparent 70%),
        linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 35%, var(--bg-3) 100%);
    }
    .page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      width: 100%;
      padding: 20px clamp(18px, 5vw, 60px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(0, 0, 0, 0.06);
      backdrop-filter: blur(4px);
    }
    .brand {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.2px;
    }
    .brand small {
      display: block;
      margin-top: 2px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.8px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .hero {
      width: 100%;
      text-align: center;
      padding: 48px 18px 26px;
    }
    .hero h1 {
      font-size: clamp(30px, 4vw, 52px);
      font-weight: 300;
      line-height: 1.08;
      letter-spacing: -0.6px;
      margin-bottom: 10px;
    }
    .hero h1 strong {
      color: var(--accent);
      font-weight: 800;
    }
    .hero p {
      max-width: 760px;
      margin: 0 auto;
      font-size: clamp(14px, 1.75vw, 20px);
      color: var(--muted);
      line-height: 1.45;
    }
    .wrap {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 8px 16px 34px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
    }
    .hint {
      width: 100%;
      text-align: center;
      font-size: 13px;
      color: #f8fafc;
      padding: 11px 16px;
      border-radius: 14px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(6px);
    }
    .error {
      width: 100%;
      text-align: center;
      padding: 16px;
      border-radius: 12px;
      background: rgba(239, 68, 68, 0.16);
      color: #fecaca;
      border: 1px solid rgba(252, 165, 165, 0.4);
      font-size: 14px;
      line-height: 1.5;
    }
    .card-shell {
      width: 100%;
      border-radius: 45px;
      overflow: hidden;
      box-shadow: 0 26px 62px -18px rgba(0, 0, 0, 0.45);
    }
    @media (max-width: 640px) {
      .topbar { padding: 16px 14px; }
      .brand { font-size: 18px; }
      .hero { padding-top: 36px; }
      .hero p { max-width: 95%; }
      .card-shell { border-radius: 28px; }
      .hint { font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="brand">anima<small>educacao</small></div>
      <span style="font-size:12px;color:var(--muted);">Oferta personalizada</span>
    </header>

    <section class="hero">
      <h1>Educacao como <strong>objetivo</strong></h1>
      <p>Confira sua condicao exclusiva e aproveite a oportunidade dentro do prazo informado.</p>
    </section>

    <div class="wrap">
      <div id="statusHint" class="hint">Carregando sua oferta...</div>
      <div id="cardShell" class="card-shell"></div>
    </div>
  </div>

  <script src="preview.js"></script>
  <script src="offer.js"></script>
</body>
</html>
